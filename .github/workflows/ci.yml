# Builds, vets, and tests every module in this repo: a gofmt check, go vet, go build ./...,
# go test ./... -race -cover, and a cross-compile smoke check for each cloud example's actual
# deployment target (Lambda: linux/arm64, Azure/Cloud Run: linux/amd64) so a change that breaks
# cross-compilation for a target this runner's own GOOS/GOARCH can't build natively is still
# caught. This is a multi-module repo (go.work) - the root module plus awssqs/ (its own module,
# since it's the one package with a third-party dependency); vet/build/test steps run against
# both explicitly, since `./...` from the root does not cross a nested module boundary even in
# workspace mode. See README.md for the local equivalent of each step.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./... ./awssqs/...

      - name: go build
        run: go build ./... ./awssqs/...

      - name: go test
        run: go test ./... ./awssqs/... -race -cover

      - name: cross-compile cloud examples
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-lambda-helloworld ./examples/aws-lambda-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/azure-functions-helloworld ./examples/azure-functions-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/gcp-cloudrun-helloworld ./examples/gcp-cloudrun-helloworld
