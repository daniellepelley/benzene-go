# Builds, vets, and tests every module in this repo: a gofmt check, go vet, go build ./...,
# go test ./... -race -cover, and a cross-compile smoke check for each cloud example's actual
# deployment target (Lambda: linux/arm64, Azure/Cloud Run: linux/amd64) so a change that breaks
# cross-compilation for a target this runner's own GOOS/GOARCH can't build natively is still
# caught. This is a multi-module repo (go.work) - the root module, awssqs/ and awssns/ (each its
# own module, since they're the packages with a third-party dependency), and
# examples/aws-sqs-helloworld/ and examples/aws-sns-helloworld/ (each its own module, since it
# depends on both the root and its respective binding - putting it in either would create a
# cycle); vet/build/test steps run against all of them explicitly, since `./...` from the root
# does not cross a nested module boundary even in workspace mode. See README.md for the local
# equivalent of each step.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./... ./awssqs/... ./awssns/... ./kafka/... ./diagnostics/... ./examples/aws-sqs-helloworld/... ./examples/aws-sns-helloworld/...

      - name: go build
        run: go build ./... ./awssqs/... ./awssns/... ./kafka/... ./diagnostics/... ./examples/aws-sqs-helloworld/... ./examples/aws-sns-helloworld/...

      - name: go test
        run: go test ./... ./awssqs/... ./awssns/... ./kafka/... ./diagnostics/... ./examples/aws-sqs-helloworld/... ./examples/aws-sns-helloworld/... -race -cover

      - name: cross-compile cloud examples
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-lambda-helloworld ./examples/aws-lambda-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/azure-functions-helloworld ./examples/azure-functions-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/gcp-cloudrun-helloworld ./examples/gcp-cloudrun-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/gcp-pubsub-helloworld ./examples/gcp-pubsub-helloworld
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-sqs-consumer ./examples/aws-sqs-helloworld/consumer
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-sqs-publisher ./examples/aws-sqs-helloworld/publisher
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-sns-consumer ./examples/aws-sns-helloworld/consumer
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/aws-sns-publisher ./examples/aws-sns-helloworld/publisher
